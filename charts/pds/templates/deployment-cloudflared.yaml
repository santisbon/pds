{{- if .Values.cloudflare.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pds.fullname" . }}-cloudflared
  labels:
    {{- include "pds.labels" . | nindent 4 }}
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "pds.name" . }}-cloudflared
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "pds.name" . }}-cloudflared
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:{{ .Values.cloudflare.image.tag }}
          imagePullPolicy: {{ .Values.cloudflare.image.pullPolicy }}
          args:
            - tunnel
            - --metrics
            - 0.0.0.0:2000
            - --config
            - /etc/cloudflared/config.yaml
            - run
          livenessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/cloudflared/config.yaml
              subPath: config.yaml
            - name: credentials
              mountPath: /etc/cloudflared/credentials.json
              subPath: credentials.json
              readOnly: true
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: {{ include "pds.name" . }}-cloudflared
                    app.kubernetes.io/instance: {{ .Release.Name }}
                topologyKey: kubernetes.io/hostname
      volumes:
        - name: config
          configMap:
            name: {{ include "pds.fullname" . }}-cloudflared
        - name: credentials
          secret:
            secretName: {{ required "cloudflare.credentialsSecret is required when cloudflare.enabled=true" .Values.cloudflare.credentialsSecret }}
{{- end }}
